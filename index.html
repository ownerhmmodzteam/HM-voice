<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM VOICE - CHAT MODERN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --accent: #0A84FF; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--ios-bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; overflow: hidden; height: 100vh; }
        .ios-blur { background: rgba(20, 20, 22, 0.8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .input-modern { background: rgba(255,255,255,0.06); border-radius: 16px; border: 1px solid transparent; transition: 0.3s; }
        .input-modern:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .user-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: fit-content; }
        .speaking { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(10, 132, 255, 0.2); }
        #ios-alert { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 3px; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
        .admin-panel-top { border-bottom: 1px solid rgba(10, 132, 255, 0.2); margin-bottom: 20px; padding-bottom: 20px; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="ios-alert">
        <div class="w-[300px] ios-blur p-1 shadow-2xl overflow-hidden">
            <div class="p-6 text-center">
                <h3 id="alert-title" class="font-bold text-lg">Info</h3>
                <p id="alert-msg" class="text-sm mt-2 text-white/60 leading-relaxed"></p>
            </div>
            <button onclick="closeAlert()" class="w-full py-4 border-t border-white/5 text-blue-500 font-bold active:bg-white/5">Siap</button>
        </div>
    </div>

    <div id="auth-screen" class="w-full max-w-[360px] space-y-8">
        <div class="text-center">
            <img src="https://files.catbox.moe/4y3suf.png" class="w-24 h-24 rounded-[30px] mx-auto mb-4 shadow-2xl border border-white/10">
            <h1 class="text-3xl font-black italic tracking-tighter">HM <span class="text-blue-500">VOICE</span></h1>
            <p id="auth-title" class="text-xs text-white/40 mt-1 uppercase tracking-widest font-bold">Selamat Datang!!</p>
        </div>
        <div id="login-form" class="space-y-4">
            <input type="text" id="user_id" placeholder="Username" class="w-full p-4 input-modern font-bold text-center">
            <input type="password" id="user_pass" placeholder="Password" class="w-full p-4 input-modern font-bold text-center">
            <button onclick="handleAuth()" class="w-full p-4 bg-blue-600 rounded-2xl font-black text-sm uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Masuk Sekarang</button>
            <p class="text-center text-xs text-white/40">Belum punya akun? <span onclick="toggleAuth(true)" class="text-blue-500 font-bold cursor-pointer">Daftar</span></p>
        </div>
        <div id="register-form" class="space-y-4 hidden">
            <input type="text" id="reg_id" placeholder="Buat Username" class="w-full p-4 input-modern font-bold text-center">
            <input type="password" id="reg_pass" placeholder="Buat Password" class="w-full p-4 input-modern font-bold text-center">
            <button onclick="handleRegister()" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl font-black text-sm uppercase active:scale-95 transition-all">Daftar Akun</button>
            <p class="text-center text-xs text-white/40">Sudah ada akun? <span onclick="toggleAuth(false)" class="text-blue-500 font-bold cursor-pointer">Login</span></p>
        </div>
    </div>

    <div id="room-screen" class="w-full max-w-[380px] hidden space-y-6">
        <div class="ios-blur p-8 shadow-2xl">
            <div id="admin-access-panel" class="hidden admin-panel-top">
                <p class="text-[9px] font-black uppercase text-blue-500 mb-3 tracking-[0.2em]">Master Room Access</p>
                <div id="active-rooms-list" class="space-y-2 max-h-[120px] overflow-y-auto pr-2"></div>
            </div>
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-2xl font-black">Dashboard</h2>
                    <p class="text-[10px] text-white/40 uppercase font-bold tracking-widest">Pilih Ruangan Voice</p>
                </div>
                <div class="w-10 h-10 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-center">
                    <i class="fa-solid fa-layer-group text-blue-500"></i>
                </div>
            </div>
            <div class="space-y-6">
                <div class="relative">
                    <input type="number" id="room_id" placeholder="ID Room" class="w-full p-6 input-modern text-center font-black text-3xl text-blue-500">
                    <button onclick="joinRoom()" class="w-full mt-4 p-4 bg-blue-600 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">Gabung ke Room</button>
                </div>
                <button onclick="createNewRoom()" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center gap-3 font-black text-xs uppercase active:scale-95 transition-all">
                    <i class="fa-solid fa-plus-circle text-blue-500"></i> Buat Room Baru
                </button>
            </div>
        </div>
    </div>

    <div id="voice-screen" class="fixed inset-0 bg-black hidden flex flex-col p-6">
        <div class="flex items-center justify-between py-6">
            <button onclick="leaveRoom()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10"><i class="fa-solid fa-chevron-left text-xs"></i></button>
            <div class="text-center">
                <h2 id="room-display" class="text-sm font-black tracking-widest text-blue-500 uppercase">ROOM</h2>
                <p class="text-[8px] text-white/30 font-bold uppercase tracking-widest mt-1">Voice Server By hmmodz</p>
            </div>
            <button onclick="toggleSettings()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10"><i class="fa-solid fa-sliders text-xs"></i></button>
        </div>
        <div id="user-grid" class="flex-1 grid grid-cols-2 gap-3 overflow-y-auto py-2 content-start"></div>
        <div id="volume-panel" class="hidden ios-blur p-6 mb-4">
            <input type="range" id="master-volume" min="0" max="1" step="0.1" value="1" class="w-full">
        </div>
        <div class="ios-blur p-6 flex justify-around items-center mb-6 shadow-2xl border-t border-white/10">
            <button onclick="toggleMute()" id="mute-btn" class="w-16 h-16 rounded-[24px] bg-white/5 flex items-center justify-center text-xl transition-all active:scale-90 border border-white/5">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <button onclick="leaveRoom()" class="w-20 h-16 rounded-[24px] bg-red-500 text-white flex items-center justify-center text-2xl active:scale-90 transition-all shadow-lg shadow-red-500/30">
                <i class="fa-solid fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cracker-generator-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let localStream, currentUser, currentRoom, userRole = "user";
        const hmProfile = "https://files.catbox.moe/4y3suf.png";
        const defaultProfile = "https://ui-avatars.com/api/?background=1c1c1e&color=fff&bold=true&name=";

        function showAlert(t, m) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('ios-alert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }
        function toggleAuth(isReg) {
            document.getElementById('login-form').classList.toggle('hidden', isReg);
            document.getElementById('register-form').classList.toggle('hidden', !isReg);
        }

        function handleRegister() {
            const user = document.getElementById('reg_id').value.trim();
            const pass = document.getElementById('reg_pass').value.trim();
            if(!user || !pass) return showAlert("Gagal", "Lengkapi form.");
            db.ref('users/' + user).once('value', s => {
                if(s.exists()) return showAlert("Maaf", "Username ada.");
                const isStaff = user.toUpperCase().includes("HM_") || user.toUpperCase().includes("ADMIN_");
                db.ref('users/' + user).set({ pass: pass, avatar: isStaff ? hmProfile : defaultProfile + user, role: isStaff ? "staff" : "user" }).then(() => {
                    showAlert("Sukses", "Berhasil!"); toggleAuth(false);
                });
            });
        }

        function handleAuth() {
            const user = document.getElementById('user_id').value.trim();
            const pass = document.getElementById('user_pass').value.trim();
            db.ref('users/' + user).once('value', s => {
                if(!s.exists() || s.val().pass !== pass) return showAlert("Gagal", "Salah!");
                currentUser = user; userRole = s.val().role;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('room-screen').classList.remove('hidden');
                if(userRole === "staff") {
                    document.getElementById('admin-access-panel').classList.remove('hidden');
                    listenActiveRooms();
                }
                autoDeleteObserver();
            });
        }

        function autoDeleteObserver() {
            db.ref('rooms').on('value', snapshot => {
                snapshot.forEach(child => {
                    const rid = child.key;
                    const data = child.val();
                    if (!data.users) {
                        setTimeout(() => {
                            db.ref('rooms/' + rid).once('value', fresh => {
                                if (!fresh.exists() || fresh.val().users) return;
                                db.ref('rooms/' + rid).remove();
                            });
                        }, 3000);
                    }
                });
            });
        }

        function listenActiveRooms() {
            db.ref('rooms').on('value', s => {
                const list = document.getElementById('active-rooms-list');
                list.innerHTML = "";
                s.forEach(child => {
                    const rid = child.key;
                    const count = child.val().users ? Object.keys(child.val().users).length : 0;
                    list.innerHTML += `<div class="flex items-center justify-between p-3 bg-white/5 rounded-xl mb-2">
                        <div><p class="text-[9px] font-black text-blue-500 uppercase">Room: ${rid}</p>
                        <p class="text-[7px] text-white/30 font-bold uppercase">${count} User</p></div>
                        <button onclick="adminJoin('${rid}')" class="px-3 py-1 bg-blue-600 rounded-lg text-[8px] font-black uppercase">Master Join</button>
                    </div>`;
                });
            });
        }

        function adminJoin(rid) { document.getElementById('room_id').value = rid; joinRoom(); }

        function createNewRoom() {
            const rid = Math.floor(1000 + Math.random() * 9000);
            db.ref('rooms/' + rid).set({ owner: currentUser, createdAt: Date.now() }).then(() => {
                document.getElementById('room_id').value = rid;
            });
        }

        function joinRoom() {
            const rid = document.getElementById('room_id').value.trim();
            if(!rid) return;
            db.ref('rooms/' + rid).once('value', s => {
                if(!s.exists()) return showAlert("Error", "Room Tidak Ada.");
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    localStream = stream; currentRoom = rid;
                    document.getElementById('room-screen').classList.add('hidden');
                    document.getElementById('voice-screen').classList.remove('hidden');
                    document.getElementById('room-display').innerText = "ROOM: " + rid;
                    db.ref('rooms/' + rid + '/users/' + currentUser).set({
                        avatar: (currentUser.toUpperCase().includes("HM_")) ? hmProfile : defaultProfile + currentUser,
                        muted: false, role: userRole, vol: 1
                    });
                    listenUsers();
                }).catch(() => showAlert("Mic", "Izin Mic Gagal."));
            });
        }

        function listenUsers() {
            db.ref('rooms/' + currentRoom + '/users').on('value', s => {
                const grid = document.getElementById('user-grid');
                grid.innerHTML = "";
                s.forEach(child => {
                    const u = child.val();
                    grid.innerHTML += `<div class="user-card flex flex-col items-center p-4 ios-blur ${u.muted ? 'opacity-30' : 'speaking'}">
                        <div class="relative mb-3"><img src="${u.avatar}" class="w-16 h-16 rounded-[22px] object-cover">
                        ${u.role === "staff" ? '<div class="absolute -top-1 -right-1 bg-blue-600 px-1 text-[6px] font-black">STAFF</div>' : ''}</div>
                        <span class="text-[10px] font-black uppercase text-white/80">${child.key}</span>
                        <div class="mt-3 w-full flex items-center gap-2 bg-white/5 p-2 rounded-xl">
                            <input type="range" class="flex-1" min="0" max="1" step="0.1" value="1">
                        </div></div>`;
                });
            });
        }

        function toggleMute() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('mute-btn').innerHTML = track.enabled ? '<i class="fa-solid fa-microphone"></i>' : '<i class="fa-solid fa-microphone-slash text-red-500"></i>';
            db.ref('rooms/' + currentRoom + '/users/' + currentUser).update({ muted: !track.enabled });
        }
        function toggleSettings() { document.getElementById('volume-panel').classList.toggle('hidden'); }
        function leaveRoom() { if(currentRoom) db.ref('rooms/' + currentRoom + '/users/' + currentUser).remove(); location.reload(); }
    </script>
</body>
</html>

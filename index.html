<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM VOICE V5.2 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --accent: #0A84FF; --hm-gold: #FFD700; }
        body { background: var(--ios-bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        .ios-blur { background: rgba(25, 25, 27, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 30px; }
        .input-ios { background: rgba(255,255,255,0.08); border-radius: 14px; outline: none; }
        .user-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .speaking { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(10, 132, 255, 0.3); transform: scale(1.02); }
        .role-badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 7px; padding: 2px 6px; border-radius: 10px; font-weight: 900; text-transform: uppercase; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-height: 60vh; overflow-y: auto; padding: 10px; }
        #ios-alert { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="ios-alert">
        <div class="w-[280px] bg-[#1c1c1e] rounded-3xl overflow-hidden shadow-2xl border border-white/10">
            <div class="p-6 text-center">
                <h3 id="alert-title" class="font-bold text-[17px] text-white">System</h3>
                <p id="alert-msg" class="text-[13px] mt-2 text-white/60 leading-relaxed"></p>
            </div>
            <button onclick="closeAlert()" class="w-full py-4 border-t border-white/5 text-blue-500 font-bold text-[17px] active:bg-white/5">OK</button>
        </div>
    </div>

    <div id="auth-screen" class="w-full max-w-[350px] p-8 text-center">
        <div class="relative w-24 h-24 mx-auto mb-8">
            <div class="absolute inset-0 bg-blue-600 blur-2xl opacity-20"></div>
            <img src="https://files.catbox.moe/4y3suf.png" class="relative w-24 h-24 rounded-[28px] shadow-2xl border border-white/10">
        </div>
        <h1 class="text-3xl font-black italic mb-10 tracking-tighter text-white">HM <span class="text-blue-500">VOICE</span></h1>
        <div class="space-y-3">
            <input type="text" id="user_id" placeholder="Username" class="w-full p-4 input-ios text-sm font-bold text-white border border-white/5 focus:border-blue-500/50">
            <input type="password" id="user_pass" placeholder="Password" class="w-full p-4 input-ios text-sm font-bold text-white border border-white/5 focus:border-blue-500/50">
            <button onclick="handleAuth()" class="w-full p-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-widest mt-4 active:scale-95 transition-all shadow-lg shadow-blue-600/20">Connect Node</button>
        </div>
    </div>

    <div id="room-screen" class="w-full max-w-[350px] hidden text-center p-6">
        <div class="ios-blur p-8 shadow-2xl">
            <div class="w-12 h-1 bg-white/10 mx-auto rounded-full mb-6"></div>
            <h2 class="text-xl font-black text-white/90 mb-8 uppercase tracking-tighter">Channel Gate</h2>
            <div class="space-y-4">
                <div class="bg-white/5 p-2 rounded-2xl border border-white/5">
                    <input type="number" id="room_id" placeholder="Room ID" class="w-full p-4 bg-transparent text-center font-black text-2xl text-blue-500 placeholder:text-white/10">
                    <button onclick="joinRoom()" class="w-full p-4 bg-blue-600 rounded-xl font-black text-xs uppercase active:scale-95 transition-all">Join Channel</button>
                </div>
                
                <div class="flex items-center py-2">
                    <div class="flex-1 border-t border-white/5"></div>
                    <span class="px-4 text-[9px] font-black text-white/20 uppercase tracking-widest">Server Action</span>
                    <div class="flex-1 border-t border-white/5"></div>
                </div>

                <button onclick="createNewRoom()" class="w-full p-5 bg-white/5 border border-white/5 rounded-2xl font-black text-xs uppercase text-blue-400 active:scale-95 transition-all flex items-center justify-center">
                    <i class="fa-solid fa-plus-circle mr-3 text-lg"></i>Create New Node
                </button>
            </div>
        </div>
    </div>

    <div id="voice-screen" class="fixed inset-0 bg-black hidden flex flex-col justify-between p-6 pt-12">
        <div class="text-center">
            <div class="inline-block px-4 py-1 bg-blue-600/10 rounded-full border border-blue-500/20 mb-2">
                <span id="room-display" class="text-[10px] font-black tracking-[0.3em] text-blue-500 uppercase"></span>
            </div>
            <p class="text-[8px] text-white/20 font-bold uppercase tracking-[0.5em]">Node Encrypted & Secured</p>
        </div>

        <div id="user-grid" class="grid-container mt-4"></div>

        <div class="ios-blur p-6 flex justify-around items-center mb-6 shadow-2xl border-t border-white/10">
            <button onclick="toggleMute()" id="mute-btn" class="w-16 h-16 rounded-3xl bg-white/5 flex items-center justify-center text-xl transition-all active:scale-90 border border-white/5">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <button onclick="leaveRoom()" class="w-16 h-16 rounded-3xl bg-red-500/10 text-red-500 flex items-center justify-center text-xl active:scale-90 transition-all border border-red-500/20">
                <i class="fa-solid fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cracker-generator-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localStream, currentUser, currentRoom, userRole = "user";
        const hmProfile = "https://files.catbox.moe/4y3suf.png";
        const defaultProfile = "https://ui-avatars.com/api/?background=1c1c1e&color=fff&bold=true&name=";

        function showAlert(t, m) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('ios-alert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }

        function handleAuth() {
            const user = document.getElementById('user_id').value.trim();
            const pass = document.getElementById('user_pass').value.trim();
            if(!user || !pass) return showAlert("Access Denied", "Username dan Password wajib diisi!");

            const isHM = user.toUpperCase().includes("HM_") || user.toUpperCase().includes("ADMIN_");
            const finalProfile = isHM ? hmProfile : defaultProfile + user;
            userRole = isHM ? "staff" : "user";

            db.ref('users/' + user).once('value', s => {
                if(s.exists() && s.val().pass !== pass) return showAlert("Denied", "Password untuk akun ini salah!");
                db.ref('users/' + user).update({ pass: pass, avatar: finalProfile, role: userRole }).then(() => {
                    currentUser = user;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('room-screen').classList.remove('hidden');
                });
            });
        }

        function createNewRoom() {
            const newId = Math.floor(1000 + Math.random() * 9000);
            db.ref('rooms/' + newId).set({ createdBy: currentUser, createdAt: Date.now() }).then(() => {
                document.getElementById('room_id').value = newId;
                showAlert("Node Created", "Server " + newId + " siap digunakan. Silahkan join!");
            });
        }

        function joinRoom() {
            const rid = document.getElementById('room_id').value.trim();
            if(!rid) return showAlert("Error", "ID Room belum diisi!");

            db.ref('rooms/' + rid).once('value', snapshot => {
                if(!snapshot.exists()) return showAlert("Offline", "ID Server tidak ditemukan di database!");
                
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    localStream = stream;
                    currentRoom = rid;
                    document.getElementById('room-screen').classList.add('hidden');
                    document.getElementById('voice-screen').classList.remove('hidden');
                    document.getElementById('room-display').innerText = "NODE: " + rid;
                    
                    db.ref('rooms/' + rid + '/users/' + currentUser).set({
                        avatar: (currentUser.toUpperCase().includes("HM_") || currentUser.toUpperCase().includes("ADMIN_")) ? hmProfile : defaultProfile + currentUser,
                        muted: false,
                        role: userRole
                    });
                    listenUsers();
                }).catch(() => showAlert("Mic Error", "Nyalakan izin mikrofon di pengaturan browser/HP Tuan!"));
            });
        }

        function listenUsers() {
            db.ref('rooms/' + currentRoom + '/users').on('value', s => {
                const grid = document.getElementById('user-grid');
                grid.innerHTML = "";
                s.forEach(child => {
                    const u = child.val();
                    const name = child.key;
                    const isStaff = u.role === "staff";
                    grid.innerHTML += `
                        <div class="user-card flex flex-col items-center p-5 ios-blur ${u.muted ? 'opacity-30' : 'speaking'}">
                            ${isStaff ? '<span class="role-badge">HM TEAM</span>' : ''}
                            <div class="relative mb-3">
                                <img src="${u.avatar}" class="w-20 h-20 rounded-[24px] object-cover border-2 ${u.muted ? 'border-white/5' : 'border-blue-500 shadow-lg shadow-blue-500/20'}">
                                <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-[#1c1c1e] rounded-full flex items-center justify-center border border-white/10">
                                    <i class="fa-solid ${u.muted ? 'fa-microphone-slash text-red-500' : 'fa-microphone text-blue-500'} text-[9px]"></i>
                                </div>
                            </div>
                            <span class="text-[11px] font-black uppercase truncate w-full text-center tracking-tighter text-white/80">${name}</span>
                        </div>
                    `;
                });
            });
        }

        function toggleMute() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('mute-btn');
            btn.innerHTML = track.enabled ? '<i class="fa-solid fa-microphone"></i>' : '<i class="fa-solid fa-microphone-slash text-red-500"></i>';
            db.ref('rooms/' + currentRoom + '/users/' + currentUser).update({ muted: !track.enabled });
        }

        function leaveRoom() {
            if(currentRoom) db.ref('rooms/' + currentRoom + '/users/' + currentUser).remove();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            location.reload();
        }
    </script>
</body>
</html>

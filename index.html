<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM VOICE V5.2 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-bg: #000; --accent: #0A84FF; }
        body { background: var(--ios-bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        .ios-blur { background: rgba(25, 25, 27, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 30px; }
        .input-ios { background: rgba(255,255,255,0.08); border-radius: 14px; outline: none; color: white; }
        .user-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .speaking { border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.05); }
        .hidden { display: none; }
        #ios-alert { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-height: 60vh; overflow-y: auto; padding: 10px; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="ios-alert">
        <div class="w-[270px] bg-[#1c1c1e] rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-5 text-center">
                <h3 id="alert-title" class="font-bold text-[17px]">System</h3>
                <p id="alert-msg" class="text-[13px] mt-1 text-white/70"></p>
            </div>
            <button onclick="closeAlert()" class="w-full py-3 border-t border-white/10 text-blue-500 font-bold text-[17px]">OK</button>
        </div>
    </div>

    <div id="auth-screen" class="w-full max-w-[350px] p-8 text-center animate-in fade-in duration-700">
        <img src="https://files.catbox.moe/4y3suf.png" class="w-24 h-24 mx-auto rounded-[24px] mb-8 shadow-2xl border border-white/10">
        <h1 class="text-3xl font-black italic mb-6 tracking-tighter">HM <span class="text-blue-500">VOICE</span></h1>
        
        <div id="login-form" class="space-y-3">
            <input type="text" id="user_id" placeholder="Username" class="w-full p-4 input-ios text-sm font-bold">
            <input type="password" id="user_pass" placeholder="Password" class="w-full p-4 input-ios text-sm font-bold">
            <button onclick="handleAuth()" class="w-full p-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-widest mt-2 active:scale-95 transition-all">Login Account</button>
            <p class="text-[11px] text-white/40 mt-4">Belum punya akun? <span onclick="toggleAuth()" class="text-blue-500 font-bold cursor-pointer">Daftar Sekarang</span></p>
        </div>

        <div id="register-form" class="space-y-3 hidden">
            <input type="text" id="reg_id" placeholder="Username Baru" class="w-full p-4 input-ios text-sm font-bold">
            <input type="password" id="reg_pass" placeholder="Password Baru" class="w-full p-4 input-ios text-sm font-bold">
            <button onclick="handleRegister()" class="w-full p-4 bg-green-600 rounded-2xl font-black text-xs uppercase tracking-widest mt-2 active:scale-95 transition-all">Create Account</button>
            <p class="text-[11px] text-white/40 mt-4">Sudah punya akun? <span onclick="toggleAuth()" class="text-blue-500 font-bold cursor-pointer">Login</span></p>
        </div>
    </div>

    <div id="room-screen" class="w-full max-w-[350px] hidden text-center p-6">
        <div class="ios-blur p-8">
            <h2 class="text-xl font-bold mb-8">Room Server Voice</h2>
            <div class="space-y-4">
                <input type="text" id="room_id" placeholder="Room ID (1000-9999)" class="w-full p-4 input-ios text-center font-black text-blue-500">
                <button onclick="joinRoom()" class="w-full p-4 bg-blue-600 rounded-2xl font-black text-xs uppercase">Join Room</button>
                <div class="flex items-center py-2"><div class="flex-1 border-t border-white/10"></div><span class="px-3 text-[10px] text-white/20">OR</span><div class="flex-1 border-t border-white/10"></div></div>
                <button onclick="createNewRoom()" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl font-black text-xs uppercase text-blue-400">Create New Server</button>
            </div>
        </div>
    </div>

    <div id="voice-screen" class="fixed inset-0 bg-black hidden flex flex-col justify-between p-6 pt-12">
        <div class="text-center">
            <h2 id="room-display" class="text-lg font-black tracking-widest text-blue-500 uppercase"></h2>
            <p class="text-[9px] text-white/30 font-bold uppercase tracking-[0.4em]">Voice Ini Di Enkripsi.</p>
        </div>
        <div id="user-grid" class="grid-container"></div>
        <div class="ios-blur p-6 flex justify-around items-center mb-8">
            <button onclick="toggleMute()" id="mute-btn" class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center text-xl"><i class="fa-solid fa-microphone"></i></button>
            <button onclick="leaveRoom()" class="w-16 h-16 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center text-xl"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cracker-generator-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localStream, currentUser, currentRoom;
        const avatars = ["https://i.pravatar.cc/150?u=1", "https://i.pravatar.cc/150?u=2", "https://i.pravatar.cc/150?u=3", "https://i.pravatar.cc/150?u=4"];
        const myAvatar = avatars[Math.floor(Math.random() * avatars.length)];

        function showAlert(t, m) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('ios-alert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }

        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        function handleRegister() {
            const user = document.getElementById('reg_id').value.trim();
            const pass = document.getElementById('reg_pass').value.trim();
            if(!user || !pass) return showAlert("Error", "Isi semua kolom daftar Tuan!");

            db.ref('users/' + user).once('value', s => {
                if(s.exists()) return showAlert("Error", "Username sudah terdaftar!");
                db.ref('users/' + user).set({ pass: pass, avatar: myAvatar, role: "member hmmodz" }).then(() => {
                    showAlert("Success", "Akun berhasil dibuat! Silakan Login.");
                    toggleAuth();
                });
            });
        }

        function handleAuth() {
            const user = document.getElementById('user_id').value.trim();
            const pass = document.getElementById('user_pass').value.trim();
            if(!user || !pass) return showAlert("Error", "Lengkapi data Login!");

            db.ref('users/' + user).once('value', s => {
                if(!s.exists()) return showAlert("Error", "User tidak ditemukan!");
                if(s.val().pass !== pass) return showAlert("Denied", "Password Salah!");
                
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('room-screen').classList.remove('hidden');
            });
        }

        function createNewRoom() {
            const id = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('room_id').value = id;
            showAlert("Created", "ID Baru: " + id + ". Klik Join Room!");
        }

        function joinRoom() {
            const rid = document.getElementById('room_id').value.trim();
            if(!rid) return showAlert("Error", "ID Room kosong!");

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                localStream = stream;
                currentRoom = rid;
                document.getElementById('room-screen').classList.add('hidden');
                document.getElementById('voice-screen').classList.remove('hidden');
                document.getElementById('room-display').innerText = "ROOM " + rid;
                db.ref('rooms/' + rid + '/users/' + currentUser).set({ avatar: myAvatar, muted: false });
                listenUsers();
            }).catch(() => showAlert("Mic Error", "Nyalakan mic Tuan!"));
        }

        function listenUsers() {
            db.ref('rooms/' + currentRoom + '/users').on('value', s => {
                const grid = document.getElementById('user-grid');
                grid.innerHTML = "";
                s.forEach(child => {
                    const u = child.val();
                    grid.innerHTML += `<div class="user-card flex flex-col items-center p-4 ios-blur ${u.muted ? 'opacity-40' : 'speaking'}">
                        <img src="${u.avatar}" class="w-16 h-16 rounded-full border-2 mb-2">
                        <span class="text-[10px] font-black uppercase">${child.key}</span>
                    </div>`;
                });
            });
        }

        function toggleMute() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            db.ref('rooms/' + currentRoom + '/users/' + currentUser).update({ muted: !track.enabled });
        }

        function leaveRoom() {
            if(currentRoom) db.ref('rooms/' + currentRoom + '/users/' + currentUser).remove();
            location.reload();
        }
    </script>
</body>
</html>
